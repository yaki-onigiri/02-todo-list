<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <h1>TODOリスト</h1>

        <div class="input-area">
            <input type="text" id="todo-input" placeholder="タスクを入力">

            <div class="button-group">
                <button id="add-button">追加</button>
                <button id="clear-Button">全削除</button>
            </div>

        </div>

        <ul id="todo-list"></ul>
    
        <div class="filters">
            <button id="filter-all">すべて</button>
            <button id="filter-active">未完了</button>
            <button id="filter-completed">完了</button>
        </div>

        <p id="task-count">残りタスク：0</p>
        <button id="clearCompleted">完了タスクを削除</button>

        <button id="dark-mode-toggle">ダークモード</button>
    </div>

    <script src="js/script.js"></script>
    
</body>

</html>
